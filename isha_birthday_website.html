<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Isha Betu</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', 'Segoe UI', sans-serif;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: radial-gradient(circle at top left, #fff1f8, transparent 34%),
                  radial-gradient(circle at bottom right, #d6e7ff, transparent 36%),
                  linear-gradient(135deg, #ff78b6, #ffb4d2, #b8d4ff, #d9b8ff);
      background-size: 300% 300%;
      animation: bgMove 12s ease infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    @keyframes bgMove {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .glow {
      position: fixed;
      width: 330px;
      height: 330px;
      border-radius: 50%;
      background: rgba(255,255,255,0.25);
      filter: blur(22px);
      animation: drift 9s infinite alternate ease-in-out;
    }

    .glow.one { top: 8%; left: 7%; }
    .glow.two { bottom: 8%; right: 7%; animation-delay: 2s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(45px, -25px) scale(1.15); }
    }

    .container {
      width: min(92vw, 760px);
      text-align: center;
      padding: 42px 26px;
      border-radius: 34px;
      background: rgba(255,255,255,0.16);
      border: 1px solid rgba(255,255,255,0.34);
      box-shadow: 0 30px 80px rgba(80, 20, 80, 0.22);
      backdrop-filter: blur(18px);
      z-index: 2;
      animation: cardIn 1s ease forwards;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(30px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .tag {
      display: inline-block;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      margin-bottom: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    h1 {
      font-size: clamp(2.5rem, 8vw, 5.4rem);
      line-height: 1.02;
      text-shadow: 0 10px 30px rgba(70, 20, 80, 0.3);
      animation: floatTitle 3.2s ease-in-out infinite;
    }

    @keyframes floatTitle {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .name {
      display: block;
      background: linear-gradient(90deg, #fff, #fff7b8, #fff);
      -webkit-background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 18px auto 0;
      font-size: clamp(1rem, 3vw, 1.25rem);
      max-width: 520px;
      opacity: 0.96;
      line-height: 1.65;
    }

    .wish-btn {
      margin-top: 34px;
      border: none;
      padding: 17px 36px;
      border-radius: 999px;
      font-size: 1.12rem;
      font-weight: 800;
      color: #ff438f;
      background: white;
      cursor: pointer;
      box-shadow: 0 18px 38px rgba(96, 35, 85, 0.28);
      transition: 0.25s ease;
      animation: pulse 1.8s infinite;
    }

    .wish-btn:hover {
      transform: translateY(-5px) scale(1.05);
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.65); }
      50% { box-shadow: 0 0 0 20px rgba(255,255,255,0); }
    }

    .hint {
      margin-top: 18px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .letter-bg {
      position: fixed;
      inset: 0;
      background: rgba(28, 8, 38, 0.42);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 10;
    }

    .letter-bg.show { display: flex; }

    .envelope-wrap {
      position: relative;
      width: min(92vw, 540px);
      perspective: 1200px;
    }

    .envelope {
      height: 320px;
      border-radius: 22px;
      background: linear-gradient(145deg, #ff6ea9, #ff9ac7);
      box-shadow: 0 30px 80px rgba(0,0,0,0.34);
      position: relative;
      overflow: hidden;
      animation: envPop 0.7s ease forwards;
    }

    @keyframes envPop {
      from { opacity: 0; transform: translateY(45px) scale(0.8) rotate(-4deg); }
      to { opacity: 1; transform: translateY(0) scale(1) rotate(0); }
    }

    .envelope::before, .envelope::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.22);
      clip-path: polygon(0 0, 50% 55%, 100% 0);
      transform-origin: top;
      animation: flapOpen 1s 0.45s forwards ease-in-out;
    }

    .envelope::after {
      background: rgba(255,255,255,0.15);
      clip-path: polygon(0 100%, 50% 45%, 100% 100%);
    }

    @keyframes flapOpen {
      to { transform: rotateX(160deg); opacity: 0.45; }
    }

    .letter {
      width: calc(100% - 34px);
      min-height: 390px;
      background: rgba(255, 255, 255, 0.98);
      color: #46224a;
      border-radius: 26px;
      padding: 32px 26px;
      box-shadow: 0 22px 65px rgba(0,0,0,0.28);
      position: absolute;
      left: 17px;
      top: 38px;
      transform: translateY(135px) scale(0.92);
      opacity: 0;
      animation: letterRise 1s 1s forwards cubic-bezier(.2,.9,.2,1.2);
      text-align: left;
    }

    @keyframes letterRise {
      to { transform: translateY(-110px) scale(1); opacity: 1; }
    }

    .letter h2 {
      text-align: center;
      font-size: clamp(1.7rem, 6vw, 2.35rem);
      color: #ff438f;
      margin-bottom: 20px;
    }

    .message {
      font-size: 1.05rem;
      line-height: 1.85;
      white-space: pre-line;
      min-height: 160px;
    }

    .sign {
      margin-top: 18px;
      font-weight: 800;
      font-size: 1.08rem;
      text-align: right;
      color: #7b2cbf;
    }

    .close-btn {
      display: block;
      margin: 24px auto 0;
      border: none;
      padding: 12px 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff438f, #8a5cff);
      color: white;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(255,67,143,0.28);
    }

    .float-item {
      position: fixed;
      pointer-events: none;
      animation: rise linear infinite;
      opacity: 0.85;
      z-index: 1;
    }

    @keyframes rise {
      from { transform: translateY(110vh) rotate(0deg); }
      to { transform: translateY(-150px) rotate(360deg); }
    }

    .confetti {
      position: fixed;
      width: 9px;
      height: 15px;
      top: -20px;
      animation: confettiFall 3.4s linear forwards;
      z-index: 20;
      border-radius: 3px;
    }

    @keyframes confettiFall {
      to { transform: translateY(110vh) rotate(760deg); opacity: 0; }
    }

    @media (max-width: 520px) {
      .container { padding: 34px 18px; }
      .envelope { height: 300px; }
      .letter { min-height: 400px; padding: 28px 20px; }
      @keyframes letterRise {
        to { transform: translateY(-95px) scale(1); opacity: 1; }
      }
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="container">
    <div class="tag">A little surprise for you ✨</div>
    <h1>Happy Birthday <span class="name">Isha Betu</span></h1>
    <p class="subtitle">Tap the button and open a cute birthday letter filled with wishes, smiles, and love.</p>
    <button class="wish-btn" onclick="openLetter()">Open Wishes 💌</button>
    <p class="hint">Best viewed with full volume of happiness 🎈</p>
  </main>

  <section class="letter-bg" id="letterBox" onclick="outsideClose(event)">
    <div class="envelope-wrap">
      <div class="envelope"></div>
      <article class="letter">
        <h2>Happy Birthday Isha Betu 💖</h2>
        <p class="message" id="typedMessage"></p>
        <div class="sign" id="signature"></div>
        <button class="close-btn" onclick="closeLetter()">Close Letter</button>
      </article>
    </div>
  </section>

  <script>
    const message = `God may bless u and bring solace and always keep radiant/winsome smile on ur face.\n\nEnjoy your day with ur friends.`;
    const signature = `~ Rajveer Singh`;
    let typingTimer;

    function createFloatingItems() {
      const symbols = ['💖', '✨', '🌸', '🎈', '🎉', '💫'];
      for (let i = 0; i < 42; i++) {
        const item = document.createElement('div');
        item.className = 'float-item';
        item.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        item.style.left = Math.random() * 100 + 'vw';
        item.style.animationDuration = 5 + Math.random() * 8 + 's';
        item.style.animationDelay = Math.random() * 6 + 's';
        item.style.fontSize = 16 + Math.random() * 24 + 'px';
        document.body.appendChild(item);
      }
    }

    function openLetter() {
      const box = document.getElementById('letterBox');
      box.classList.add('show');
      document.getElementById('typedMessage').textContent = '';
      document.getElementById('signature').textContent = '';
      launchConfetti();
      setTimeout(typeMessage, 1700);
    }

    function typeMessage() {
      const target = document.getElementById('typedMessage');
      let i = 0;
      clearInterval(typingTimer);
      typingTimer = setInterval(() => {
        target.textContent += message[i];
        i++;
        if (i >= message.length) {
          clearInterval(typingTimer);
          document.getElementById('signature').textContent = signature;
        }
      }, 28);
    }

    function closeLetter() {
      document.getElementById('letterBox').classList.remove('show');
      clearInterval(typingTimer);
    }

    function outsideClose(event) {
      if (event.target.id === 'letterBox') closeLetter();
    }

    function launchConfetti() {
      const colors = ['#ff438f', '#fff176', '#7b2cbf', '#4cc9f0', '#ffffff', '#ffb703'];
      for (let i = 0; i < 120; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = Math.random() * 0.7 + 's';
        piece.style.animationDuration = 2.2 + Math.random() * 2.2 + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 5200);
      }
    }

    createFloatingItems();
  </script>
</body>
</html>
